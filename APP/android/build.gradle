allprojects {
    repositories {
        google()
        mavenCentral()
    }
}

rootProject.buildDir = '../build'

subprojects {
    project.buildDir = "${rootProject.buildDir}/${project.name}"
}

subprojects {
    project.evaluationDependsOn(':app')
}

// FIX: Inject a mock "flutter" extension into every plugin subproject
// BEFORE their build.gradle is evaluated. Plugins like package_info_plus
// read flutter.compileSdkVersion, flutter.minSdkVersion, etc. If the
// extension is missing, AGP 8.3 crashes. We create it early so they
// self-configure correctly.
subprojects {
    if (project.name != "app" && project.extensions.findByName("flutter") == null) {
        project.extensions.create("flutter", FlutterExtension)
    }
}

// Mock class that supplies the properties plugins expect
class FlutterExtension {
    int compileSdkVersion = 35
    int minSdkVersion = 21
    int targetSdkVersion = 35
    String namespace = "com.example.placeholder"
}

tasks.register("clean", Delete) {
    delete rootProject.buildDir
}
